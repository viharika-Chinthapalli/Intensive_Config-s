# Render Blueprint — https://render.com/docs/blueprint-spec
# Commands run from the **repository root** (monorepo) so they work even if the
# dashboard "Root Directory" is left blank. Always build + start `batch-tracker-ui/`.
services:
  - type: web
    name: batch-tracker-ui
    runtime: node
    plan: free
    buildCommand: npm --prefix batch-tracker-ui ci && npm --prefix batch-tracker-ui run build && test -f batch-tracker-ui/client/dist/index.html
    startCommand: npm --prefix batch-tracker-ui start
    healthCheckPath: /
